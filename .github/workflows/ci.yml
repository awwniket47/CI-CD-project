# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint with Ruff
        run: |
          cd backend
          ruff check . --select E,F,W --ignore E501

      - name: Security audit
        run: |
          pip install pip-audit
          cd backend
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969

      - name: Run tests (if any)
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet"

  frontend-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build check
        run: |
          cd frontend
          npm run build

  docker-build-check:
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
      - uses: actions/checkout@v4

      - name: Verify backend Docker build
        run: docker build -t retailmind-backend:test ./backend

      - name: Verify frontend Docker build
        run: docker build -t retailmind-frontend:test ./frontend