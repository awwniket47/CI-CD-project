name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint with Ruff
        run: |
          cd backend
          ruff check . --select E,F,W --ignore E501 --exclude tests/

      - name: Run tests
        env:
          GEMINI_API_KEY: fake-key-for-testing
          TAVILY_API_KEY: fake-key-for-testing
          KB_DIR: /tmp/kb_data
          CHROMA_DIR: /tmp/chroma_db
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  frontend-tests:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build check
        run: |
          cd frontend
          npm run build

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t retailmind-backend:test ./backend

      - name: Build frontend image
        run: docker build -t retailmind-frontend:test ./frontend