name: Build & Deploy RetailMind

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE:  ${{ secrets.DOCKERHUB_USERNAME }}/retailmind-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/retailmind-frontend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx ruff

      - name: Lint with Ruff
        run: |
          cd backend
          ruff check . --select E,F,W --ignore E501 --exclude tests/

      - name: Run backend tests
        env:
          GEMINI_API_KEY: fake-key-for-testing
          TAVILY_API_KEY: fake-key-for-testing
          KB_DIR: /tmp/kb_data
          CHROMA_DIR: /tmp/chroma_db
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Frontend build check
        run: |
          cd frontend
          npm ci
          npm run build

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # ── Bootstrap: install Docker + Compose V2 if not present ──
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi
            if ! docker compose version &> /dev/null; then
              COMPOSE_VERSION=$(curl -s https://api.github.com/repos/docker/compose/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
              sudo curl -SL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # ── Bootstrap: clone repo on first deploy if directory absent ──
            if [ ! -d "$HOME/retailmind" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/retailmind"
            fi

            cd "$HOME/retailmind"
            git fetch origin main
            git reset --hard origin/main

            # ── Pull new images and restart ──
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            # ── Health check ──
            sleep 15
            curl -f http://localhost:8000/api/health && echo "Deploy successful" || (echo "Deploy failed — check logs" && exit 1)